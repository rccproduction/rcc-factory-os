<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RCC | Digital Stockroom</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #f8fafc; --surface: #ffffff; --accent: #2563eb; --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body.dark-mode { --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; --text: #f8fafc; --text-dim: #94a3b8; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .header-banner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px 30px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .header-title { grid-column: 2; text-align: center; } .header-title h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .main-content { padding: 30px; max-width: 1200px; margin: auto; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom:20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-weight: 600; }
        .btn { padding: 8px 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color:white; }
        .btn-plus { background: var(--success); } .btn-minus { background: var(--danger); }
        .low-stock { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-right: 10px; }
    </style>
</head>
<body>
    <div class="header-banner">
        <div><a href="index.html" style="text-decoration:none; color:var(--text-dim); font-weight:bold;">← HUB</a></div>
        <div class="header-title"><h1>📦 DIGITAL STOCKROOM</h1></div>
        <div style="text-align:right;"><button onclick="document.body.classList.toggle('dark-mode')" style="padding:5px 10px;">🌓</button></div>
    </div>
    <div class="main-content">
        <div class="panel" style="display:flex; gap:10px; align-items:center;">
            <input type="text" id="p-name" placeholder="Part Name (e.g. Multi-Lube 100)" style="flex:2;">
            <input type="number" id="p-qty" placeholder="Starting Qty" style="flex:1;">
            <input type="number" id="p-min" placeholder="Min Alert Level" style="flex:1;">
            <button class="btn btn-plus" onclick="addPart()" style="padding:12px; flex:1;">➕ ADD NEW PART</button>
        </div>
        <div class="panel">
            <table>
                <thead><tr><th>Part / Consumable Name</th><th>Current Stock</th><th>Minimum Level</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="inventory-body"></tbody>
            </table>
        </div>
    </div>
    <script>
        const sb = supabase.createClient("https://ywjnbslxdssyriokcdws.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3am5ic2x4ZHNzeXJpb2tjZHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDg1MDUsImV4cCI6MjA5MTIyNDUwNX0.sNFCBZoSwZS0b5eU6iBmLeTt5ru7dP8G2GYJ9hrxAFg");
        
        async function fetchInventory() {
            const { data } = await sb.from('inventory_parts').select('*').order('part_name');
            if(data) {
                document.getElementById('inventory-body').innerHTML = data.map(p => {
                    let isLow = p.quantity <= p.min_level;
                    return `<tr class="${isLow ? 'low-stock' : ''}">
                        <td>${p.part_name}</td><td><b>${p.quantity}</b></td><td>${p.min_level}</td>
                        <td>${isLow ? '🚨 RE-ORDER' : '✅ OK'}</td>
                        <td><button class="btn btn-minus" onclick="updateQty(${p.id}, ${p.quantity - 1})">-1</button> 
                        <button class="btn btn-plus" onclick="updateQty(${p.id}, ${p.quantity + 1})">+1</button>
                        <button style="margin-left:15px; background:transparent; border:none; cursor:pointer;" onclick="deletePart(${p.id})">🗑</button></td>
                    </tr>`;
                }).join('');
            }
        }
        async function addPart() {
            const name = document.getElementById('p-name').value; const qty = parseInt(document.getElementById('p-qty').value); const min = parseInt(document.getElementById('p-min').value);
            if(name && qty >= 0 && min >= 0) { await sb.from('inventory_parts').insert([{ part_name: name, quantity: qty, min_level: min }]); fetchInventory(); }
        }
        async function updateQty(id, newQty) { if(newQty >= 0) { await sb.from('inventory_parts').update({ quantity: newQty }).eq('id', id); fetchInventory(); } }
        async function deletePart(id) { if(confirm('Delete part?')) { await sb.from('inventory_parts').delete().eq('id', id); fetchInventory(); } }
        window.onload = () => { fetchInventory(); if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode'); };
    </script>
</body>
</html>
